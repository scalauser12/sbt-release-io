name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SBT2_VERSION: "2.0.0-RC9"

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Run formatting checks
        run: sbt scalafmtCheckAll scalafmtSbtCheck

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sbt-line: ["sbt1", "sbt2"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Run unit tests on ${{ matrix.sbt-line == 'sbt2' && format('sbt {0}', env.SBT2_VERSION) || 'sbt 1.12.3' }}
        run: sbt ${{ matrix.sbt-line == 'sbt2' && format('-Dsbt.version={0}', env.SBT2_VERSION) || '-Dsbt.version=1.12.3' }} test

  core-scripted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Configure git
        run: git config --global init.defaultBranch main
      - name: Run core scripted tests
        run: sbt core/scripted

  core-scripted-sbt2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Configure git
        run: git config --global init.defaultBranch main
      - name: Run core scripted tests on sbt 2
        run: sbt -Dsbt.version=${{ env.SBT2_VERSION }} core/scripted

  monorepo-scripted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Configure git
        run: git config --global init.defaultBranch main
      - name: Run monorepo scripted tests
        run: sbt monorepo/scripted

  monorepo-scripted-sbt2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Configure git
        run: git config --global init.defaultBranch main
      - name: Run monorepo scripted tests on sbt 2
        run: sbt -Dsbt.version=${{ env.SBT2_VERSION }} monorepo/scripted

  publish:
    needs:
      [
        format-check,
        unit-tests,
        core-scripted,
        core-scripted-sbt2,
        monorepo-scripted,
        monorepo-scripted-sbt2,
      ]
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Publish to Maven Central
        run: sbt ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
